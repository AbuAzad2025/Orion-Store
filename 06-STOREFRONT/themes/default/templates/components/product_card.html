<div class="rounded-lg border bg-white p-4 shadow-sm hover:shadow-md transition">
  <a href="/product/{{ product.slug }}">
    <h3 class="font-semibold text-gray-800 mb-1">{{ product.name }}</h3>
    <p class="text-emerald-700 font-bold">{{ product.price }} ₪</p>
  </a>
  <button data-add-cart="{{ product.id }}" class="mt-3 w-full rounded bg-emerald-600 py-2 text-white text-sm">أضف للسلة</button>
</div>
