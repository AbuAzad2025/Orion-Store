{% extends "base.html" %}
{% block content %}
<article class="max-w-lg mx-auto bg-white rounded-lg shadow p-6">
  <h1 class="text-2xl font-bold mb-2">{{ product.name }}</h1>
  <p class="text-2xl text-emerald-700 font-bold mb-4">{{ product.price }} ₪</p>
  {% if product.short_description %}<p class="text-gray-600 mb-6">{{ product.short_description }}</p>{% endif %}
  <button data-add-cart="{{ product.id }}" class="rounded bg-emerald-600 px-6 py-2 text-white">أضف للسلة</button>
  <a href="/cart" class="mr-4 text-sm text-gray-600 underline">عرض السلة</a>
</article>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('storefront_assets.static', filename='js/cart.js') }}"></script>
{% endblock %}
