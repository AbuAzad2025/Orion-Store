<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }} — Azadexa Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen" {% if tenant %}data-tenant-id="{{ tenant.slug }}"{% endif %} data-user-id="">
  <div class="flex min-h-screen">
    {% include "components/sidebar.html" %}
    <main class="flex-1 p-6">
      <header class="mb-6">
        <h1 class="text-2xl font-bold text-gray-800">{{ page_title }}</h1>
        {% if tenant %}<p class="text-sm text-gray-500">{{ tenant.name }}</p>{% endif %}
      </header>
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="{{ url_for('admin_assets.static', filename='js/api_client.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
