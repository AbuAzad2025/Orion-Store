{% extends "admin_base.html" %}
{% block content %}
<div class="space-y-6">
  <section class="rounded border bg-white p-4">
    <h2 class="text-lg font-semibold mb-3">المستودعات</h2>
    <form id="oms-warehouse-form" class="grid gap-2 max-w-md mb-4 text-sm">
      <input name="name" type="text" placeholder="اسم المستودع" class="border rounded px-3 py-2" required>
      <input name="code" type="text" placeholder="رمز" class="border rounded px-3 py-2" required>
      <label class="inline-flex items-center gap-2">
        <input name="is_default" type="checkbox">
        افتراضي
      </label>
      <button type="submit" class="rounded bg-blue-600 px-4 py-2 text-white w-fit">إضافة مستودع</button>
    </form>
    <div id="oms-warehouses-list" class="text-gray-500 text-sm">جاري التحميل...</div>
  </section>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('admin_assets.static', filename='js/tenant_ops.js') }}"></script>
<script>OrionTenantOps.initOms();</script>
{% endblock %}
