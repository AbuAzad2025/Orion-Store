<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }} — Azadexa</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">
  <form id="login-form" class="bg-white p-8 rounded-lg shadow w-full max-w-md space-y-4">
    <h1 class="text-xl font-bold text-center">Azadexa Admin</h1>
    <div>
      <label class="block text-sm mb-1" for="email">البريد</label>
      <input id="email" type="email" required class="w-full border rounded px-3 py-2">
    </div>
    <div>
      <label class="block text-sm mb-1" for="password">كلمة المرور</label>
      <input id="password" type="password" required class="w-full border rounded px-3 py-2">
    </div>
    <div>
      <label class="block text-sm mb-1" for="tenant-slug">Slug المتجر (اختياري)</label>
      <input id="tenant-slug" type="text" class="w-full border rounded px-3 py-2" placeholder="my-store">
    </div>
    <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded">دخول</button>
    <p id="login-error" class="text-red-600 text-sm"></p>
  </form>
  <script src="{{ url_for('admin_assets.static', filename='js/api_client.js') }}"></script>
  <script src="{{ url_for('admin_assets.static', filename='js/admin_login.js') }}"></script>
</body>
</html>
