groups:
  - name: orion-api
    rules:
      - alert: OrionApiDown
        expr: up{job="orion-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Orion API scrape target is down
          description: Prometheus cannot reach orion-api /metrics for 2 minutes.

      - alert: OrionHigh5xxRate
        expr: |
          (
            sum(rate(orion_http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(orion_http_requests_total[5m])), 1)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Orion API 5xx rate above 5%
          description: More than 5% of HTTP responses are 5xx over the last 5 minutes.

      - alert: OrionSlowP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(orion_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Orion API p95 latency above 500ms
          description: 95th percentile request latency exceeded 500ms for 10 minutes.
