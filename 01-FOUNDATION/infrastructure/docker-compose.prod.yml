# Production stack — Orion MVP (§18)
# Usage: docker compose --env-file .env.production -f 01-FOUNDATION/infrastructure/docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: azadexa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: azadexa_prod
    volumes:
      - prod_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U azadexa -d azadexa_prod"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 8

  orion-api:
    build:
      context: ../..
      dockerfile: 01-FOUNDATION/infrastructure/Dockerfile
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://azadexa:${POSTGRES_PASSWORD}@postgres:5432/azadexa_prod
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: production
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      BETA_MODE: ${BETA_MODE:-false}
      BETA_TENANT_SLUGS: ${BETA_TENANT_SLUGS:-}
      PROMETHEUS_ENABLED: "true"
      CACHE_ENABLED: "true"
      LOG_JSON: "true"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/ready"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 40s

  celery-worker:
    build:
      context: ../..
      dockerfile: 01-FOUNDATION/infrastructure/Dockerfile
    restart: unless-stopped
    command: celery -A orion.celery_app.celery_app worker --loglevel=info
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://azadexa:${POSTGRES_PASSWORD}@postgres:5432/azadexa_prod
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      orion-api:
        condition: service_healthy

volumes:
  prod_postgres:
