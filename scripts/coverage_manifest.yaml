# Per-file coverage gates — grows wave-by-wave (§0.8, §33.9 #8).
# Add every new production .py here when it ships; CI fails if a tracked file is missing.
version: 1

path_defaults:
  "04-SERVICES/": 80
  "02-CORE/core/": 75
  "02-CORE/orion/": 70
  "05-API/": 70
  "03-MODELS/": 60

exclude_from_scan:
  - "**/__init__.py"
  - "**/wsgi.py"
  - "**/tests/**"
  - "**/test_*.py"
  - "03-MODELS/base/mixins.py"
  - "migrations/**"

